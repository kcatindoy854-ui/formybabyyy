<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fireworks Surprise</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #000;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        canvas {
            display: block;
            position: absolute;
            top: 0;
            left: 0;
        }
        #startButton {
            position: absolute;
            z-index: 10;
            padding: 20px 40px;
            font-size: 24px;
            background: linear-gradient(45deg, #ff6b6b, #feca57, #48dbfb, #ff9ff3);
            border: none;
            border-radius: 50px;
            color: white;
            cursor: pointer;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
            box-shadow: 0 0 20px rgba(255,255,255,0.5);
            transition: transform 0.3s, box-shadow 0.3s;
        }
        #startButton:hover {
            transform: scale(1.1);
            box-shadow: 0 0 40px rgba(255,255,255,0.8);
        }
        #startButton.hidden {
            opacity: 0;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <button id="startButton">🎵 Click to Start 🎵</button>
    <canvas id="canvas"></canvas>
    
    <!-- AUDIO ELEMENT - Replace 'your-music.mp3' with your actual music file -->
    <audio id="backgroundMusic" loop>
        <source src="music.mp3" type="audio/mpeg">
        <source src="your-music.ogg" type="audio/ogg">
        Your browser does not support the audio element.
    </audio>

<script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const startButton = document.getElementById('startButton');
    const backgroundMusic = document.getElementById('backgroundMusic');

    let animationStarted = false;

    // Set canvas to fullscreen
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    let fireworks = [];
    let particles = [];
    let floatingTexts = [];
    let hue = 120;
    let timerTick = 0;
    let fireworkCount = 0;
    let maxFireworksBeforeText = 7;
    
    let textExploded = false;
    let isTextGrowing = false;
    let textScale = 0;
    const textMessage = "I MISS YOU SO MUCH,\nBABY KO.";
    const textMaxScale = 4;

    let startMultipleTexts = false;
    let multipleTextTimer = 0;

    window.addEventListener('resize', () => {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    });

    function random(min, max) {
        return Math.random() * (max - min) + min;
    }

    function calculateDistance(p1x, p1y, p2x, p2y) {
        let xDistance = p1x - p2x;
        let yDistance = p1y - p2y;
        return Math.sqrt(Math.pow(xDistance, 2) + Math.pow(yDistance, 2));
    }

    // --- CLASSES ---

    class Firework {
        constructor(sx, sy, tx, ty) {
            this.x = sx;
            this.y = sy;
            this.sx = sx;
            this.sy = sy;
            this.tx = tx;
            this.ty = ty;
            this.distanceToTarget = calculateDistance(sx, sy, tx, ty);
            this.distanceTraveled = 0;
            this.coordinates = [];
            this.coordinateCount = 3;
            
            while(this.coordinateCount--) {
                this.coordinates.push([this.x, this.y]);
            }
            this.angle = Math.atan2(ty - sy, tx - sx);
            this.speed = 2;
            this.acceleration = 1.05;
            this.brightness = random(50, 70);
            this.targetRadius = 1;
        }

        update(index) {
            this.coordinates.pop();
            this.coordinates.unshift([this.x, this.y]);

            if(this.targetRadius < 8) {
                this.targetRadius += 0.3;
            } else {
                this.targetRadius = 1;
            }

            this.speed *= this.acceleration;

            let vx = Math.cos(this.angle) * this.speed;
            let vy = Math.sin(this.angle) * this.speed;
            
            this.distanceTraveled = calculateDistance(this.sx, this.sy, this.x + vx, this.y + vy);

            if(this.distanceTraveled >= this.distanceToTarget) {
                createParticles(this.tx, this.ty);
                fireworks.splice(index, 1);
                
                fireworkCount++;
                if (fireworkCount === maxFireworksBeforeText && !textExploded && !isTextGrowing) {
                    startTextAnimation();
                }
            } else {
                this.x += vx;
                this.y += vy;
            }
        }

        draw() {
            ctx.beginPath();
            ctx.moveTo(this.coordinates[this.coordinates.length - 1][0], this.coordinates[this.coordinates.length - 1][1]);
            ctx.lineTo(this.x, this.y);
            ctx.strokeStyle = 'hsl(' + hue + ', 100%, ' + this.brightness + '%)';
            ctx.stroke();
        }
    }

    class Particle {
        constructor(x, y, isTextParticle = false) {
            this.x = x;
            this.y = y;
            this.coordinates = [];
            this.coordinateCount = 5;
            while(this.coordinateCount--) {
                this.coordinates.push([this.x, this.y]);
            }
            
            this.isTextParticle = isTextParticle;
            this.angle = random(0, Math.PI * 2);
            this.speed = random(1, 10);
            this.friction = 0.95;
            this.gravity = 1;
            this.hue = random(hue - 20, hue + 20);
            this.brightness = random(50, 80);
            this.alpha = 1;
            this.decay = random(0.015, 0.03);
        }

        update(index) {
            this.coordinates.pop();
            this.coordinates.unshift([this.x, this.y]);
            
            this.speed *= this.friction;
            this.x += Math.cos(this.angle) * this.speed;
            this.y += Math.sin(this.angle) * this.speed + this.gravity;
            this.alpha -= this.decay;

            if(this.alpha <= this.decay) {
                particles.splice(index, 1);
            }
        }

        draw() {
            ctx.beginPath();
            ctx.moveTo(this.coordinates[this.coordinates.length - 1][0], this.coordinates[this.coordinates.length - 1][1]);
            ctx.lineTo(this.x, this.y);
            ctx.strokeStyle = 'hsla(' + this.hue + ', 100%, ' + this.brightness + '%, ' + this.alpha + ')';
            ctx.stroke();
        }
    }

    class FloatingText {
        constructor() {
            this.x = random(100, canvas.width - 100);
            this.y = random(100, canvas.height - 100);
            this.scale = random(0.5, 1.5);
            this.rotation = random(-0.5, 0.5);
            this.hue = random(0, 360);
            this.alpha = 0;
            this.targetAlpha = 1;
            this.life = 1;
            this.decay = random(0.005, 0.015);
            this.velocityY = random(-1, -3);
        }

        update() {
            this.y += this.velocityY;
            this.life -= this.decay;
            
            if (this.alpha < this.targetAlpha) {
                this.alpha += 0.05;
            }
        }

        draw() {
            ctx.save();
            ctx.translate(this.x, this.y);
            ctx.rotate(this.rotation);
            ctx.scale(this.scale, this.scale);
            
            ctx.globalAlpha = this.life * this.alpha;
            ctx.font = "bold 40px Arial";
            ctx.fillStyle = `hsl(${this.hue}, 100%, 70%)`;
            ctx.textAlign = "center";
            ctx.textBaseline = "middle";
            
            ctx.shadowColor = `hsl(${this.hue}, 100%, 50%)`;
            ctx.shadowBlur = 15;

            const lines = textMessage.split('\n');
            const lineHeight = 50;
            const startY = -((lines.length - 1) * lineHeight / 2);

            lines.forEach((line, index) => {
                ctx.fillText(line, 0, startY + (index * lineHeight));
            });

            ctx.restore();
        }
    }

    // --- FUNCTIONS ---

    function createParticles(x, y) {
        let particleCount = 50;
        while(particleCount--) {
            particles.push(new Particle(x, y));
        }
    }

    function startTextAnimation() {
        isTextGrowing = true;
        textScale = 0.5;
    }

    function createTextParticles() {
        textExploded = true;
        isTextGrowing = false;
        
        const tempCanvas = document.createElement('canvas');
        const tempCtx = tempCanvas.getContext('2d');
        tempCanvas.width = canvas.width;
        tempCanvas.height = canvas.height;

        tempCtx.font = "bold 60px Arial";
        tempCtx.fillStyle = "white";
        tempCtx.textAlign = "center";
        tempCtx.textBaseline = "middle";
        
        const lines = textMessage.split('\n');
        const lineHeight = 70;
        const startY = (canvas.height / 2) - ((lines.length - 1) * lineHeight / 2);

        lines.forEach((line, index) => {
            tempCtx.fillText(line, canvas.width / 2, startY + (index * lineHeight));
        });

        const imageData = tempCtx.getImageData(0, 0, canvas.width, canvas.height);
        const data = imageData.data;

        for(let y = 0; y < canvas.height; y += 4) {
            for(let x = 0; x < canvas.width; x += 4) {
                const index = (y * canvas.width + x) * 4;
                const alpha = data[index + 3];

                if(alpha > 128) {
                    let p = new Particle(x, y, true);
                    p.speed = random(3, 12);
                    p.hue = random(0, 360);
                    p.decay = 0.02;
                    particles.push(p);
                }
            }
        }
    }

    function drawGrowingText() {
        ctx.save();
        ctx.translate(canvas.width / 2, canvas.height / 2);
        ctx.scale(textScale, textScale);
        ctx.translate(-canvas.width / 2, -canvas.height / 2);

        ctx.font = "bold 60px Arial";
        ctx.fillStyle = "rgba(255, 255, 255, 1)";
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        
        ctx.shadowColor = "white";
        ctx.shadowBlur = 20;

        const lines = textMessage.split('\n');
        const lineHeight = 70;
        const startY = (canvas.height / 2) - ((lines.length - 1) * lineHeight / 2);

        lines.forEach((line, index) => {
            ctx.fillText(line, canvas.width / 2, startY + (index * lineHeight));
        });

        ctx.restore();
    }

    function loop() {
        requestAnimationFrame(loop);

        ctx.globalCompositeOperation = 'destination-out';
        ctx.fillStyle = 'rgba(0, 0, 0, 0.5)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        
        ctx.globalCompositeOperation = 'lighter';

        let i = fireworks.length;
        while(i--) {
            fireworks[i].draw();
            fireworks[i].update(i);
        }

        let j = particles.length;
        while(j--) {
            particles[j].draw();
            particles[j].update(j);
        }

        let k = floatingTexts.length;
        while(k--) {
            floatingTexts[k].draw();
            floatingTexts[k].update();
            if(floatingTexts[k].life <= 0) {
                floatingTexts.splice(k, 1);
            }
        }

        if (isTextGrowing) {
            textScale += 0.08;
            drawGrowingText();
            
            if (textScale >= textMaxScale) {
                createTextParticles();
            }
        }

        if (textExploded && !startMultipleTexts) {
            multipleTextTimer++;
            if (multipleTextTimer > 120) {
                startMultipleTexts = true;
            }
        }

        if (startMultipleTexts) {
            if (timerTick % 10 === 0) {
                floatingTexts.push(new FloatingText());
            }
        }

        timerTick++;

        if (fireworkCount < maxFireworksBeforeText && !isTextGrowing && !textExploded) {
            if(timerTick % 20 === 0) {
                let startX = canvas.width / 2;
                let startY = canvas.height;
                let targetX = random(canvas.width * 0.2, canvas.width * 0.8);
                let targetY = random(canvas.height * 0.1, canvas.height * 0.4);
                
                fireworks.push(new Firework(startX, startY, targetX, targetY));
                hue = random(0, 360);
            }
        } 
        else if (startMultipleTexts) {
            if(timerTick % 40 === 0) {
                 let startX = canvas.width / 2;
                let startY = canvas.height;
                let targetX = random(0, canvas.width);
                let targetY = random(0, canvas.height / 2);
                fireworks.push(new Firework(startX, startY, targetX, targetY));
                hue += 5;
            }
        }
    }

    // --- START BUTTON CLICK HANDLER ---
    startButton.addEventListener('click', () => {
        // Play music
        backgroundMusic.play().catch(error => {
            console.log("Audio play failed:", error);
        });
        
        // Hide button
        startButton.classList.add('hidden');
        
        // Start animation
        animationStarted = true;
        loop();
    });

</script>
</body>
</html>
